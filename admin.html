<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Admin Dashboard</h2>

<input id="searchUser" placeholder="Search users..." onkeyup="loadUsers()">

<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('pending')">Pending</button>
<button onclick="setFilter('approved')">Approved</button>
<button onclick="setFilter('rejected')">Rejected</button>

<h3>🔔 Notifications</h3>
<div id="notifications"></div>

<button onclick="logout()">Logout</button>

<hr>

<h3>👥 Users</h3>
<div id="usersList"></div>

<hr>

<h3>💰 Deposits</h3>
<div id="depositList"></div>

<hr>

<h3>📈 Investments</h3>
<div id="investList"></div>

<hr>

<h3>💸 Withdrawals</h3>
<div id="withdrawList"></div>

<script>

/////////////////////////////////////////////////////
// 🔐 ADMIN ACCESS
/////////////////////////////////////////////////////

let role = localStorage.getItem("role");

if (role !== "admin") {
  alert("Access denied");
  window.location.href = "login.html";
}

/////////////////////////////////////////////////////
// 📦 LOAD DATA
/////////////////////////////////////////////////////

let users = JSON.parse(localStorage.getItem("users")) || [];
let deposits = JSON.parse(localStorage.getItem("deposits")) || [];
let investments = JSON.parse(localStorage.getItem("pendingInvestments")) || [];
let withdrawals = JSON.parse(localStorage.getItem("withdrawals")) || [];

let filterStatus = "all";

/////////////////////////////////////////////////////
// 🔔 NOTIFICATIONS
/////////////////////////////////////////////////////

let notifications = JSON.parse(localStorage.getItem("adminNotifications")) || [];

function addNotification(text) {
  notifications.unshift({
    text,
    time: new Date().toLocaleTimeString()
  });

  if (notifications.length > 10) notifications.pop();

  localStorage.setItem("adminNotifications", JSON.stringify(notifications));
  renderNotifications();
}

function renderNotifications() {
  document.getElementById("notifications").innerHTML =
    notifications.map(n => `
      <div class="card">
        🔔 ${n.text}<br>
        <small>${n.time}</small>
      </div>
    `).join("");
}

/////////////////////////////////////////////////////
// 👥 USERS (WITH SEARCH + PROFILE IMAGE)
/////////////////////////////////////////////////////

function loadUsers() {

  let search = document.getElementById("searchUser").value.toLowerCase();

  let filtered = users.filter(u =>
    u.username.toLowerCase().includes(search)
  );

  document.getElementById("usersList").innerHTML =
    filtered.map(u => `
      <div class="card">

        <img src="${u.image || 'https://via.placeholder.com/60'}"
             style="width:60px;height:60px;border-radius:50%;margin-bottom:10px;">

        <p><b>Username:</b> ${u.username}</p>
        <p><b>Email:</b> ${u.email || "N/A"}</p>
        <p><b>Balance:</b> $${u.balance || 0}</p>

      </div>
    `).join("");
}

/////////////////////////////////////////////////////
// 💰 FILTER SYSTEM
/////////////////////////////////////////////////////

function setFilter(status) {
  filterStatus = status;
  loadDeposits();
  loadInvestments();
  loadWithdrawals();
}

/////////////////////////////////////////////////////
// 💰 DEPOSITS (FULL FIX)
/////////////////////////////////////////////////////

function loadDeposits() {

  let list = deposits;

  if (filterStatus !== "all") {
    list = list.filter(d => d.status === filterStatus);
  }

  document.getElementById("depositList").innerHTML =
    list.map((d, i) => {

      let userData = users.find(u => u.username === d.user) || {};

      return `
        <div class="card">

          <img src="${userData.image || 'https://via.placeholder.com/50'}"
               style="width:50px;height:50px;border-radius:50%;">

          <p><b>User:</b> ${d.user}</p>
          <p><b>Email:</b> ${userData.email || "N/A"}</p>

          <p><b>Coin:</b> ${d.coin}</p>
          <p><b>Amount:</b> $${d.amount}</p>
          <p><b>Status:</b> ${d.status}</p>

          ${d.status === "pending" ? `
            <button onclick="approveDeposit(${i})">✅ Approve</button>
            <button onclick="rejectDeposit(${i})">❌ Reject</button>
          ` : ""}

        </div>
      `;
    }).join("");
}

function approveDeposit(i) {

  let d = deposits[i];
  let userIndex = users.findIndex(u => u.username === d.user);

  if (userIndex !== -1) {

    // ✅ ADD BALANCE
    users[userIndex].balance += d.amount;

    // ✅ CREATE INVESTMENT AFTER APPROVAL
    let investments = JSON.parse(localStorage.getItem("pendingInvestments")) || [];

    investments.push({
      user: d.user,
      plan: d.plan,
      amount: d.amount,
      profit:
        d.plan === "Starter" ? 0.10 :
        d.plan === "Pro" ? 0.20 :
        0.40,

      duration:
        d.plan === "Starter" ? 24 * 60 * 60 * 1000 :
        d.plan === "Pro" ? 48 * 60 * 60 * 1000 :
        72 * 60 * 60 * 1000,

      startTime: Date.now(),
      status: "approved",
      processed: false
    });

    localStorage.setItem("pendingInvestments", JSON.stringify(investments));
  }

  deposits[i].status = "approved";

  addNotification(`${d.user} deposit approved + investment started`);

  saveAll();
}
  
function rejectDeposit(i) {
  deposits[i].status = "rejected";
  addNotification(`Deposit rejected`);
  saveAll();
}

/////////////////////////////////////////////////////
// 📈 INVESTMENTS
/////////////////////////////////////////////////////

function loadInvestments() {

  let list = investments;

  if (filterStatus !== "all") {
    list = list.filter(i => i.status === filterStatus);
  }

  document.getElementById("investList").innerHTML =
    list.map((i, index) => `
      <div class="card">

        <p><b>User:</b> ${i.user}</p>
        <p><b>Plan:</b> ${i.plan}</p>
        <p><b>Amount:</b> $${i.amount}</p>
        <p><b>Status:</b> ${i.status}</p>

        ${i.status === "pending" ? `
          <button onclick="approveInvest(${index})">Approve</button>
          <button onclick="rejectInvest(${index})">Reject</button>
        ` : ""}

      </div>
    `).join("");
}

function approveInvest(i) {

  let item = investments[i];
  let userIndex = users.findIndex(u => u.username === item.user);

  if (userIndex !== -1) {
    let profit = item.amount * item.profit;
    users[userIndex].balance += item.amount + profit;
  }

  investments[i].status = "approved";

  addNotification(`${item.user} investment approved`);

  saveAll();
}

function rejectInvest(i) {
  investments[i].status = "rejected";
  addNotification(`Investment rejected`);
  saveAll();
}

/////////////////////////////////////////////////////
// 💸 WITHDRAWALS
/////////////////////////////////////////////////////

function loadWithdrawals() {

  let list = withdrawals;

  if (filterStatus !== "all") {
    list = list.filter(w => w.status === filterStatus);
  }

  document.getElementById("withdrawList").innerHTML =
    list.map((w, i) => `
      <div class="card">

        <p><b>User:</b> ${w.user}</p>
        <p><b>Amount:</b> $${w.amount}</p>
        <p><b>Status:</b> ${w.status}</p>

        ${w.status === "pending" ? `
          <button onclick="approveWithdraw(${i})">Approve</button>
          <button onclick="rejectWithdraw(${i})">Reject</button>
        ` : ""}

      </div>
    `).join("");
}

function approveWithdraw(i) {

  let w = withdrawals[i];
  let userIndex = users.findIndex(u => u.username === w.user);

  if (userIndex !== -1) {
    users[userIndex].balance -= w.amount;
  }

  withdrawals[i].status = "approved";

  addNotification(`${w.user} withdrawal approved`);

  saveAll();
}

function rejectWithdraw(i) {
  withdrawals[i].status = "rejected";
  addNotification(`Withdrawal rejected`);
  saveAll();
}

/////////////////////////////////////////////////////
// 💾 SAVE SYSTEM
/////////////////////////////////////////////////////

function saveAll() {
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("deposits", JSON.stringify(deposits));
  localStorage.setItem("pendingInvestments", JSON.stringify(investments));
  localStorage.setItem("withdrawals", JSON.stringify(withdrawals));

  loadUsers();
  loadDeposits();
  loadInvestments();
  loadWithdrawals();
}

/////////////////////////////////////////////////////
// 🚪 LOGOUT
/////////////////////////////////////////////////////

function logout() {
  localStorage.removeItem("loggedInUser");
  localStorage.removeItem("role");
  window.location.href = "login.html";
}

/////////////////////////////////////////////////////
// 🚀 INIT
/////////////////////////////////////////////////////

loadUsers();
loadDeposits();
loadInvestments();
loadWithdrawals();
renderNotifications();

setInterval(renderNotifications, 3000);

</script>

</body>
  </html>
