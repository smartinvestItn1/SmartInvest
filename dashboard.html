<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investment Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<img id="dashAvatar" class="iavatar">

<div class="nav">
  <button onclick="goHome()">Home</button>
  <button onclick="goProfile()">Profile</button>
  <button onclick="goHistory()">History</button>
  <button onclick="logout()">Logout</button>
</div>

<h3>Welcome, <span id="user"></span></h3>
<h2>Investment Dashboard</h2>

<!-- CARDS -->
<div class="grid">

  <div class="card">
    <h4>Balance</h4>
    <h2>$<span id="balance">0</span></h2>
  </div>

  <div class="card">
    <h4>USDT</h4>
    <h2><span id="usdt">0</span></h2>
  </div>

  <div class="card">
    <h4>Pending</h4>
    <h2><span id="pending">0</span></h2>
  </div>

  <div class="card">
    <h4>Plan</h4>
    <h2 id="planType">Starter</h2>
  </div>

</div>

<!-- DEPOSIT -->
<div class="box">
  <h3>Deposit</h3>
  <input id="depositAmount" placeholder="Enter amount">
  <button onclick="deposit()">Deposit</button>
</div>

<!-- WITHDRAW -->
<div class="box">
  <h3>Withdraw</h3>
  <input id="withdrawAmount" placeholder="Enter amount">
  <button onclick="withdraw()">Withdraw</button>
</div>

<!-- PLANS -->
<h2>Investment Plans</h2>

<div class="grid">

  <div class="card">
    <h3>Starter</h3>
    <p>10% Profit</p>
    <button onclick="goInvest('Starter')">Invest</button>
  </div>

  <div class="card">
    <h3>Pro</h3>
    <p>20% Profit</p>
    <button onclick="goInvest('Pro')">Invest</button>
  </div>

  <div class="card">
    <h3>Premium</h3>
    <p>40% Profit</p>
    <button onclick="goInvest('Premium')">Invest</button>
  </div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = localStorage.getItem("loggedInUser");

// 🔒 SAFE LOGIN CHECK
if (!currentUser) {
  window.location.href = "login.html";
}

// FIND USER
let userIndex = users.findIndex(u => u.username === currentUser);

// IF USER DOESN'T EXIST, CREATE ONE (PREVENT CRASH)
if (userIndex === -1) {
  users.push({
    username: currentUser,
    balance: 0,
    plan: "Starter"
  });
  userIndex = users.length - 1;
}

let user = users[userIndex];

// UPDATE UI
function updateUI() {

  document.getElementById("user").innerText = currentUser;

  document.getElementById("balance").innerText = user.balance || 0;

  document.getElementById("usdt").innerText =
    ((user.balance || 0) / 1500).toFixed(2);

  document.getElementById("planType").innerText = user.plan || "Starter";

  let investments = JSON.parse(localStorage.getItem("pendingInvestments")) || [];

  document.getElementById("pending").innerText =
    investments.filter(i => i.user === currentUser && i.status === "pending").length;

  localStorage.setItem("users", JSON.stringify(users));
}

// NAVIGATION
function goInvest(plan) {
  localStorage.setItem("selectedPlan", plan);
  window.location.href = "invest.html";
}

function goHome() {
  window.location.href = "index.html";
}

function goProfile() {
  window.location.href = "profile.html";
}

function goHistory() {
  window.location.href = "history.html";
}

function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "login.html";
}

// PLACEHOLDER FUNCTIONS (so buttons don't break)
function deposit() {
  window.location.href = "deposit.html";
}

function withdraw() {
  window.location.href = "withdraw.html";
}

// INIT
updateUI();

</script>

</body>
</html>
