<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<img id="dashAvatar" class="iavatar">

<div class="nav">
  <button onclick="goHome()">Home</button>
  <button onclick="goProfile()">Profile</button>
  <button onclick="goHistory()">History</button>
  <button onclick="logout()">Logout</button>
</div>

<h3>Welcome, <span id="user"></span></h3>
<h2>Investment Dashboard</h2>

<!-- CARDS -->
<div class="grid">

  <div class="card">
    <h4>USDT Balance</h4>
    <h2><span id="balance">0</span> USDT</h2>

    <!-- ETH under USDT -->
    <p style="margin-top:10px;">
      ETH: <span id="eth">0</span> ETH
    </p>
  </div>

  <div class="card">
    <h4>Bitcoin</h4>
    <h2><span id="btc">0</span> BTC</h2>
  </div>

  <div class="card">
    <h4>USDT Value</h4>
    <h2><span id="usdt">0</span> USDT</h2>
  </div>

  <div class="card">
    <h4>Pending Deposits</h4>
    <h2>$<span id="pending">0</span></h2>
  </div>

  <div class="card">
    <h4>Plan</h4>
    <h2 id="planType">Starter</h2>
  </div>

</div>

<!-- ACTIONS -->
<div class="box">
  <h3>Deposit</h3>
  <button onclick="goDeposit()">Go to Deposit Page</button>
</div>

<div class="box">
  <h3>Withdraw</h3>
  <button onclick="goWithdraw()">Withdraw Funds</button>
</div>

<!-- PLANS -->
<h2>Investment Plans</h2>

<div class="grid">

  <div class="card">
    <h3>Starter</h3>
    <p>10% Profit</p>
    <button onclick="goInvest('Starter')">Invest</button>
  </div>

  <div class="card">
    <h3>Pro</h3>
    <p>20% Profit</p>
    <button onclick="goInvest('Pro')">Invest</button>
  </div>

  <div class="card">
    <h3>Premium</h3>
    <p>40% Profit</p>
    <button onclick="goInvest('Premium')">Invest</button>
  </div>

</div>
<script>

/////////////////////////////////////////////////////
// USER LOAD (LOCAL STORAGE SYSTEM)
/////////////////////////////////////////////////////

let users = JSON.parse(localStorage.getItem("users")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

let currentUser = localStorage.getItem("loggedInUser");

if (!currentUser) {
  window.location.href = "login.html";
}

// FIND USER
let userIndex = users.findIndex(u => u.username === currentUser);

if (userIndex === -1) {
  alert("User not found");
  window.location.href = "login.html";
}

let user = users[userIndex];

/////////////////////////////////////////////////////
// PLAN SYSTEM
/////////////////////////////////////////////////////

let plans = {
  Starter: 0.10,
  Pro: 0.20,
  Premium: 0.50
};

/////////////////////////////////////////////////////
// CRYPTO RATES (SIMULATION ONLY)
/////////////////////////////////////////////////////

let btcRate = 65000;
let ethRate = 3500;

/////////////////////////////////////////////////////
// AUTO GROWTH ENGINE
/////////////////////////////////////////////////////

function startAutoProfit() {
  setInterval(() => {

    let rate = plans[user.plan || "Starter"];

    let profit = user.balance * rate;

    user.balance += profit;

    // Save history log
    history.push({
      user: currentUser,
      plan: user.plan,
      profit: profit.toFixed(2),
      balance: user.balance.toFixed(2),
      time: new Date().toLocaleTimeString()
    });

    localStorage.setItem("history", JSON.stringify(history));

    // Save user update
    users[userIndex] = user;
    localStorage.setItem("users", JSON.stringify(users));

    updateUI();

  }, 5000); // every 5 seconds
}

/////////////////////////////////////////////////////
// UPDATE DASHBOARD UI
/////////////////////////////////////////////////////

function updateUI() {

  document.getElementById("user").innerText = user.username;

  let balance = user.balance || 0;

  // USDT
  document.getElementById("balance").innerText =
    balance.toFixed(2);

  // BTC
  document.getElementById("btc").innerText =
    (balance / btcRate).toFixed(6);

  // ETH
  document.getElementById("eth").innerText =
    (balance / ethRate).toFixed(4);

  // PLAN
  document.getElementById("planType").innerText =
    user.plan || "Starter";

  // PENDING DEPOSITS
  let deposits = JSON.parse(localStorage.getItem("deposits")) || [];

  let pendingTotal = deposits
    .filter(d => d.user === currentUser && d.status === "pending")
    .reduce((sum, d) => sum + d.amount, 0);

  document.getElementById("pending").innerText = pendingTotal;

  // AVATAR
  document.getElementById("dashAvatar").src =
    user.image && user.image !== ""
      ? user.image
      : "https://via.placeholder.com/80";
}

/////////////////////////////////////////////////////
// NAVIGATION
/////////////////////////////////////////////////////

function goDeposit() {
  window.location.href = "deposit.html";
}

function goWithdraw() {
  window.location.href = "withdraw.html";
}

function goInvest(plan) {
  user.plan = plan;
  users[userIndex] = user;
  localStorage.setItem("users", JSON.stringify(users));

  updateUI();
  alert("Plan updated to " + plan);
}

function goHome() {
  window.location.href = "index.html";
}

function goProfile() {
  window.location.href = "profile.html";
}

function goHistory() {
  window.location.href = "history.html";
}

function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "login.html";
}

/////////////////////////////////////////////////////
// START SYSTEM
/////////////////////////////////////////////////////

updateUI();
startAutoProfit();

</script>

</body>
</html>
