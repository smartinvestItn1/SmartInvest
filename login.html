<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <button onclick="goHome()">🏠 Home</button>

  <form onsubmit="login(event)">

    <h2>Login</h2>

    <input id="username" placeholder="Username" required><br>
    <input id="password" type="password" placeholder="Password" required><br><br>

    <button type="submit">Login</button>

  </form>

  <p onclick="goSignup()" class="link">
    Don't have an account? Sign up
  </p>

</div>

<script>

/////////////////////////////////////////////////////
// 🔐 LOGIN SYSTEM (MULTI USER + 50 SESSIONS)
/////////////////////////////////////////////////////

function login(event) {
  event.preventDefault();

  let username = document.getElementById("username").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!username || !password) {
    alert("Please fill all fields");
    return;
  }

  /////////////////////////////////////////////////////
  // 🔥 ADMIN LOGIN
  /////////////////////////////////////////////////////

  const admins = [
    { username: "admin1", password: "123##**@@", role: "admin" },
    { username: "admin2", password: "123##**@@", role: "admin" },
    { username: "admin3", password: "123##**@@", role: "admin" },
    { username: "admin4", password: "123##**@@", role: "admin" }
  ];

  let admin = admins.find(a =>
    a.username === username && a.password === password
  );

  if (admin) {

    let sessionId = Date.now() + "_" + Math.random().toString(36).substr(2, 9);

    let sessions = JSON.parse(localStorage.getItem("activeSessions")) || [];

    sessions.push({
      username,
      role: "admin",
      sessionId,
      time: Date.now()
    });

    if (sessions.length > 50) {
      sessions.shift(); // keep only last 50 sessions
    }

    localStorage.setItem("activeSessions", JSON.stringify(sessions));

    localStorage.setItem("loggedInUser", username);
    localStorage.setItem("role", "admin");
    localStorage.setItem("sessionId", sessionId);

    window.location.href = "admin.html";
    return;
  }

  /////////////////////////////////////////////////////
  // 👤 USER LOGIN
  /////////////////////////////////////////////////////

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let foundUser = users.find(u =>
    u.username === username && u.password === password
  );

  if (!foundUser) {
    alert("Invalid username or password");
    return;
  }

  // 🔐 CREATE SESSION ID
  let sessionId = Date.now() + "_" + Math.random().toString(36).substr(2, 9);

  let sessions = JSON.parse(localStorage.getItem("activeSessions")) || [];

  sessions.push({
    username,
    role: "user",
    sessionId,
    time: Date.now()
  });

  // keep only 50 active sessions
  if (sessions.length > 50) {
    sessions.shift();
  }

  localStorage.setItem("activeSessions", JSON.stringify(sessions));

  // SAVE LOGIN STATE
  localStorage.setItem("loggedInUser", username);
  localStorage.setItem("role", "user");
  localStorage.setItem("sessionId", sessionId);

  window.location.href = "dashboard.html";
}

/////////////////////////////////////////////////////
// 🏠 NAVIGATION
/////////////////////////////////////////////////////

function goHome() {
  window.location.href = "index.html";
}

function goSignup() {
  window.location.href = "signup.html";
}

</script>

</body>
</html>
