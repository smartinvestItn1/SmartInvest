<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- HOME BUTTON -->
  <button onclick="goHome()">🏠 Home</button>

  <!-- LOGIN FORM -->
  <form onsubmit="login(event)">

    <h2>Login</h2>

    <!-- USERNAME -->
    <input id="username" placeholder="Username" required><br>

    <!-- PASSWORD (NO ICON) -->
    <input id="password" type="password" placeholder="Password" required><br><br>

    <button type="submit">Login</button>

  </form>

  <!-- SIGNUP LINK -->
  <p onclick="goSignup()" class="link">
    Don't have an account? Sign up
  </p>

</div>

<script>

/////////////////////////////////////////////////////
// 🔐 LOGIN FUNCTION (ADMIN + USER)
/////////////////////////////////////////////////////

function login(event) {
  event.preventDefault();

  let username = document.getElementById("username").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!username || !password) {
    alert("Please fill all fields");
    return;
  }

  /////////////////////////////////////////////////////
  // 🔥 MULTI ADMIN LOGIN
  /////////////////////////////////////////////////////

  const admins = [
    { username: "admin1", password: "123##**@@", role: "admin" },
    { username: "admin2", password: "123##**@@", role: "admin" },
    { username: "admin3", password: "123##**@@", role: "admin" },
    { username: "admin4", password: "123##**@@", role: "admin" }
  ];

  let admin = admins.find(a =>
    a.username === username && a.password === password
  );

  if (admin) {
    localStorage.setItem("loggedInUser", username);
    localStorage.setItem("role", "admin");

    window.location.href = "admin.html";
    return;
  }

  /////////////////////////////////////////////////////
  // 👤 USER LOGIN
  /////////////////////////////////////////////////////

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let foundUser = users.find(u =>
    u.username === username && u.password === password
  );

  if (!foundUser) {
    alert("Invalid username or password");
    return;
  }

  localStorage.setItem("loggedInUser", username);
  localStorage.setItem("role", "user");

  window.location.href = "dashboard.html";
}

/////////////////////////////////////////////////////
// 🏠 NAVIGATION
/////////////////////////////////////////////////////

function goHome() {
  window.location.href = "index.html";
}

function goSignup() {
  window.location.href = "signup.html";
  }

</script>

</body>
</html>
