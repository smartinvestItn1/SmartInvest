<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaction History</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<div class="container">

  <h2>Transaction History</h2>

  <!-- FILTER BUTTONS -->
  <div class="nav">
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('deposit')">Deposits</button>
    <button onclick="setFilter('investment')">Investments</button>
  </div>

  <!-- HISTORY LIST -->
  <div id="historyList"></div>

</div>

<script>

/////////////////////////////////////////////////////
// 🔐 USER CHECK
/////////////////////////////////////////////////////

let currentUser = localStorage.getItem("loggedInUser");

if (!currentUser) {
  window.location.href = "login.html";
}

/////////////////////////////////////////////////////
// 📦 DATA
/////////////////////////////////////////////////////

let deposits = JSON.parse(localStorage.getItem("deposits")) || [];
let investments = JSON.parse(localStorage.getItem("pendingInvestments")) || [];

let filter = "all";

/////////////////////////////////////////////////////
// 🎯 FILTER FUNCTION
/////////////////////////////////////////////////////

function setFilter(type) {
  filter = type;
  loadHistory();
}

/////////////////////////////////////////////////////
// 📜 LOAD HISTORY
/////////////////////////////////////////////////////

function loadHistory() {

  let list = [];

  // 👉 Deposits
  if (filter === "all" || filter === "deposit") {
    deposits
      .filter(d => d.user === currentUser)
      .forEach(d => {
        list.push({
          type: "Deposit",
          amount: d.amount,
          status: d.status,
          date: d.time
        });
      });
  }

  // 👉 Investments
  if (filter === "all" || filter === "investment") {
    investments
      .filter(i => i.user === currentUser)
      .forEach(i => {
        list.push({
          type: "Investment",
          amount: i.amount,
          status: i.status,
          date: i.startTime || Date.now(),
          plan: i.plan
        });
      });
  }

  // 👉 Sort latest first
  list.sort((a, b) => b.date - a.date);

  /////////////////////////////////////////////////////
  // 🖥 RENDER
  /////////////////////////////////////////////////////

  let container = document.getElementById("historyList");

  if (list.length === 0) {
    container.innerHTML = "<p>No transactions yet</p>";
    return;
  }

  container.innerHTML = list.map(item => `

    <div class="card">

      <h4>${item.type}</h4>

      <h2>₦${item.amount.toLocaleString()}</h2>

      ${item.plan ? `<p>Plan: ${item.plan}</p>` : ""}

      <p>Status: 
        <span style="
          color: ${
            item.status === 'approved' ? '#22c55e' :
            item.status === 'pending' ? '#facc15' :
            '#ef4444'
          };">
          ${item.status}
        </span>
      </p>

      <small>${new Date(item.date).toLocaleString()}</small>

    </div>

  `).join("");
}

/////////////////////////////////////////////////////
// 🔙 NAVIGATION
/////////////////////////////////////////////////////

function goBack() {
  window.location.href = "dashboard.html";
}

/////////////////////////////////////////////////////
// INIT
/////////////////////////////////////////////////////

loadHistory();

</script>

</body>
</html>
