<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deposit & Invest</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<div class="container">

  <h2>Deposit & Invest</h2>

  <!-- SELECT COIN -->
  <label>Select Cryptocurrency</label>
  <select id="coin" onchange="updateWallet()">
    <option value="USDT">USDT (TRC20)</option>
    <option value="BTC">Bitcoin</option>
    <option value="ETH">Ethereum</option>
    <option value="BNB">BNB</option>
  </select>

  <br><br>

  <!-- WALLET -->
  <label>Company Wallet</label>
  <div style="display:flex; gap:10px;">
    <input id="wallet" readonly>
    <button onclick="copyWallet()">Copy</button>
  </div>

  <br>

  <!-- AMOUNT -->
  <input id="amount" placeholder="Enter amount">

  <br><br>

  <!-- 🔥 PLAN SELECTION -->
  <label>Select Investment Plan</label>
  <select id="plan">
    <option value="Starter">Starter (10%)</option>
    <option value="Pro">Pro (20%)</option>
    <option value="Premium">Premium (40%)</option>
  </select>

  <br><br>

  <button onclick="submitDeposit()">Submit Deposit</button>

</div>

<script>
/////////////////////////////////////////////////////
// WALLET SYSTEM
/////////////////////////////////////////////////////

const wallets = {
  USDT: "TXYZUSDT_COMPANY",
  BTC: "bc1qcompanybtc",
  ETH: "0xCOMPANYETH",
  BNB: "bnbCOMPANY"
};

function updateWallet() {
  let coin = document.getElementById("coin").value;
  document.getElementById("wallet").value = wallets[coin];
}

/////////////////////////////////////////////////////
// RUN AFTER PAGE LOAD
/////////////////////////////////////////////////////

window.onload = function () {
  updateWallet();
};

/////////////////////////////////////////////////////
// 🔥 SUBMIT DEPOSIT + PLAN TO ADMIN
/////////////////////////////////////////////////////

function submitDeposit() {

  let amount = Number(document.getElementById("amount").value);
  let coin = document.getElementById("coin").value;
  let plan = document.getElementById("plan").value;

  if (!amount || amount <= 0) {
    return alert("Enter valid amount");
  }

  let user = localStorage.getItem("loggedInUser");

  if (!user) {
    return alert("Login required");
  }

  let deposits = JSON.parse(localStorage.getItem("deposits")) || [];
  let investments = JSON.parse(localStorage.getItem("pendingInvestments")) || [];

  // SAVE DEPOSIT
  deposits.push({
    user: user,
    coin: coin,
    amount: amount,
    wallet: wallets[coin],
    plan: plan,
    status: "pending",
    time: Date.now()
  });

  // SAVE INVESTMENT
  investments.push({
    user: user,
    plan: plan,
    amount: amount,
    profit:
      plan === "Starter" ? 0.10 :
      plan === "Pro" ? 0.20 :
      0.40,

    duration:
      plan === "Starter" ? 24 * 60 * 60 * 1000 :
      plan === "Pro" ? 48 * 60 * 60 * 1000 :
      72 * 60 * 60 * 1000,

    startTime: Date.now(),
    status: "pending",
    processed: false
  });

  localStorage.setItem("deposits", JSON.stringify(deposits));
  localStorage.setItem("pendingInvestments", JSON.stringify(investments));

  alert("Deposit & Investment submitted for admin approval");

  document.getElementById("amount").value = "";
}

/////////////////////////////////////////////////////
// NAVIGATION
/////////////////////////////////////////////////////

function goBack() {
  window.location.href = "dashboard.html";
}

function copyWallet() {
  let input = document.getElementById("wallet");
  input.select();
  document.execCommand("copy");
  alert("Wallet copied");
    }
</script>
</html>
