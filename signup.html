<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <button onclick="goHome()">🏠 Home</button>

  <form onsubmit="signup(event)">

    <h2>Create Account</h2>

    <input id="username" placeholder="Username" required><br>
    <input id="email" placeholder="Email" required><br>

    <div style="position:relative;">
      <input id="password" type="password" placeholder="Password" required>
    </div>

    <div style="position:relative;">
      <input id="confirm" type="password" placeholder="Confirm Password" required>
    </div>

    <button type="submit">Sign Up</button>

  </form>

  <p onclick="goLogin()" class="link">
    Already have an account? Login
  </p>

</div>

<script>

/////////////////////////////////////////////////////
// 🧾 SIGNUP FUNCTION (FORM SAFE)
/////////////////////////////////////////////////////

function signup(event) {
  event.preventDefault();

  let username = document.getElementById("username").value.trim();
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();
  let confirm = document.getElementById("confirm").value.trim();

  if (!username || !email || !password || !confirm) {
    alert("Please fill all fields");
    return;
  }

  if (password !== confirm) {
    alert("Passwords do not match");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let exists = users.find(u => u.username === username);

  if (exists) {
    alert("User already exists");
    return;
  }

  users.push({
    username,
    email,
    password,
    balance: 0,
    pending: 0,
    plan: "Starter",
    image: ""
  });

  localStorage.setItem("users", JSON.stringify(users));

  alert("Account created successfully");

  window.location.href = "login.html";
}

/////////////////////////////////////////////////////
// 🏠 NAVIGATION
/////////////////////////////////////////////////////

function goHome() {
  window.location.href = "index.html";
}

function goLogin() {
  window.location.href = "login.html";
}

/////////////////////////////////////////////////////
// 👁 TOGGLE PASSWORD
/////////////////////////////////////////////////////

function toggle(id) {
  let input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}

</script>

</body>
</html>
